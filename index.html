<div id="app-root"></div>
<style>
  :root{
    --paper:#F6F0E4;
    --paper-deep:#ECE2CC;
    --ink:#23262E;
    --ink-soft:#5B5E68;
    --stamp:#C4451F;
    --stamp-deep:#9C3215;
    --line:#D8CBA8;
    --green-ok:#3E6B4F;
  }

  *{box-sizing:border-box;}

  #app-root{
    font-family:'Zen Kaku Gothic New','Noto Sans JP',-apple-system,sans-serif;
    color:var(--ink);
    background:transparent;
    padding:0;
    min-height:100%;
  }

  .stage{
    max-width:560px;
    margin:0 auto;
    padding:28px 18px 60px;
  }

  /* ---------- Header ---------- */
  .masthead{
    text-align:center;
    margin-bottom:26px;
    position:relative;
  }
  .masthead .eyebrow{
    font-size:11px;
    letter-spacing:.18em;
    color:var(--stamp);
    font-weight:700;
    text-transform:uppercase;
  }
  .masthead h1{
    font-family:'Zen Old Mincho','Noto Serif JP',serif;
    font-size:30px;
    font-weight:700;
    margin:6px 0 4px;
    letter-spacing:.02em;
  }
  .masthead .sub{
    font-size:13px;
    color:var(--ink-soft);
  }
  .masthead .dotline{
    margin-top:18px;
    height:1px;
    background-image:repeating-linear-gradient(to right, var(--line) 0 6px, transparent 6px 12px);
  }

  /* ---------- Mode toggle (user / admin) ---------- */
  .modebar{
    display:flex;
    justify-content:center;
    gap:8px;
    margin-bottom:22px;
  }
  .modebar button{
    font-family:inherit;
    font-size:12px;
    letter-spacing:.04em;
    padding:7px 14px;
    border-radius:999px;
    border:1px solid var(--line);
    background:var(--paper-deep);
    color:var(--ink-soft);
    cursor:pointer;
    transition:.15s ease;
  }
  .modebar button.active{
    background:var(--ink);
    color:var(--paper);
    border-color:var(--ink);
  }

  /* ---------- Ticket card ---------- */
  .ticket{
    position:relative;
    background:#FFFDF8;
    border:1px solid var(--line);
    border-radius:14px;
    box-shadow:0 1px 0 rgba(35,38,46,.04), 0 14px 30px -18px rgba(35,38,46,.35);
    overflow:hidden;
  }
  .ticket-top{
    padding:26px 26px 22px;
  }
  .ticket-section-title{
    font-size:11px;
    letter-spacing:.14em;
    text-transform:uppercase;
    color:var(--stamp);
    font-weight:700;
    margin:0 0 14px;
  }
  .ticket-section-title.second{
    margin-top:26px;
  }

  .field{
    margin-bottom:16px;
  }
  .field label{
    display:block;
    font-size:12.5px;
    color:var(--ink-soft);
    margin-bottom:6px;
    font-weight:600;
  }
  .field input{
    width:100%;
    font-family:inherit;
    font-size:15px;
    padding:11px 13px;
    border:1.4px solid var(--line);
    border-radius:8px;
    background:var(--paper);
    color:var(--ink);
    transition:.15s ease;
  }
  .field input:focus{
    outline:none;
    border-color:var(--stamp);
    background:#fff;
    box-shadow:0 0 0 3px rgba(196,69,31,.12);
  }
  .field .hint{
    font-size:11px;
    color:#A9A18A;
    margin-top:4px;
  }
  .field.err input{
    border-color:var(--stamp-deep);
    background:#FFF3EE;
  }
  .field .err-msg{
    font-size:11.5px;
    color:var(--stamp-deep);
    margin-top:5px;
    font-weight:600;
  }

  /* AM/PM pills */
  .pillrow{
    display:flex;
    gap:10px;
  }
  .pill{
    flex:1;
    text-align:center;
    padding:11px 8px;
    border:1.4px solid var(--line);
    border-radius:8px;
    font-size:13.5px;
    font-weight:700;
    color:var(--ink-soft);
    cursor:pointer;
    background:var(--paper);
    transition:.15s ease;
    user-select:none;
  }
  .pill:hover{ border-color:#C7B98C; }
  .pill.selected{
    background:var(--ink);
    border-color:var(--ink);
    color:var(--paper);
  }

  /* Time grid - ticket stub style */
  .timegrid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:9px;
  }
  .timeslot{
    position:relative;
    text-align:center;
    padding:12px 4px 11px;
    border:1.4px dashed var(--line);
    border-radius:8px;
    font-size:13px;
    font-weight:700;
    color:var(--ink-soft);
    cursor:pointer;
    background:var(--paper);
    transition:.15s ease;
    user-select:none;
    letter-spacing:.01em;
  }
  .timeslot:hover{ border-color:#C7B98C; background:#fff; }
  .timeslot.selected{
    background:var(--stamp);
    border-color:var(--stamp);
    border-style:solid;
    color:#fff;
    transform:scale(0.97);
  }
  .timeslot.selected::after{
    content:'✓ 受付';
    display:block;
    font-size:9.5px;
    letter-spacing:.08em;
    margin-top:2px;
    opacity:.9;
    font-weight:600;
  }
  .timeslot.full{
    background:#EAE5D6;
    border-color:#D8CBA8;
    border-style:solid;
    color:#B6AB8C;
    cursor:not-allowed;
  }
  .timeslot.full:hover{
    border-color:#D8CBA8;
    background:#EAE5D6;
  }
  .timeslot.full::after{
    content:'満員';
    display:block;
    font-size:9.5px;
    letter-spacing:.08em;
    margin-top:2px;
    font-weight:700;
    color:var(--stamp-deep);
  }

  /* Perforation between ticket halves */
  .perforation{
    position:relative;
    height:0;
    border-top:2px dashed var(--line);
    margin:0 26px;
  }
  .perforation::before, .perforation::after{
    content:'';
    position:absolute;
    width:18px; height:18px;
    background:var(--paper-deep);
    border-radius:50%;
    top:-9px;
  }
  .perforation::before{ left:-35px; }
  .perforation::after{ right:-35px; }

  .ticket-bottom{
    padding:20px 26px 26px;
    background:linear-gradient(180deg, rgba(196,69,31,.03), transparent);
  }

  .submit-btn{
    width:100%;
    font-family:inherit;
    font-size:15.5px;
    font-weight:700;
    letter-spacing:.04em;
    padding:14px;
    border:none;
    border-radius:9px;
    background:var(--stamp);
    color:#fff;
    cursor:pointer;
    transition:.15s ease;
    margin-top:6px;
  }
  .submit-btn:hover{ background:var(--stamp-deep); }
  .submit-btn:active{ transform:scale(.99); }
  .submit-btn:disabled{ background:#D8CBA8; cursor:not-allowed; }

  .form-error{
    font-size:12.5px;
    color:var(--stamp-deep);
    background:#FFF3EE;
    border:1px solid #F0CFC2;
    border-radius:8px;
    padding:10px 12px;
    margin-bottom:14px;
    font-weight:600;
  }

  /* ---------- Confirmation ---------- */
  .confirm{
    text-align:center;
    padding:50px 26px 44px;
  }
  .confirm .stamp-circle{
    width:74px;height:74px;
    margin:0 auto 18px;
    border-radius:50%;
    border:3px solid var(--green-ok);
    display:flex;align-items:center;justify-content:center;
    color:var(--green-ok);
    font-size:34px;
    transform:rotate(-8deg);
  }
  .confirm h2{
    font-family:'Zen Old Mincho','Noto Serif JP',serif;
    font-size:22px;
    margin:0 0 8px;
  }
  .confirm p{
    font-size:13.5px;
    color:var(--ink-soft);
    line-height:1.7;
    margin:0 0 4px;
  }
  .confirm .recap{
    margin-top:22px;
    text-align:left;
    background:var(--paper);
    border:1px solid var(--line);
    border-radius:10px;
    padding:16px 18px;
    font-size:13px;
  }
  .confirm .recap div{
    display:flex;
    justify-content:space-between;
    padding:5px 0;
    border-bottom:1px dashed var(--line);
  }
  .confirm .recap div:last-child{ border-bottom:none; }
  .confirm .recap span:first-child{ color:var(--ink-soft); }
  .confirm .recap span:last-child{ font-weight:700; }
  .confirm .again{
    margin-top:20px;
    background:none;
    border:1.4px solid var(--ink);
    color:var(--ink);
    padding:10px 20px;
    border-radius:999px;
    font-size:13px;
    font-weight:700;
    cursor:pointer;
    font-family:inherit;
  }

  /* ---------- Admin ---------- */
  .admin-lock{
    background:#FFFDF8;
    border:1px solid var(--line);
    border-radius:14px;
    padding:40px 30px;
    text-align:center;
  }
  .admin-lock .lock-icon{
    font-size:30px;
    margin-bottom:10px;
  }
  .admin-lock h2{
    font-family:'Zen Old Mincho','Noto Serif JP',serif;
    font-size:19px;
    margin:0 0 6px;
  }
  .admin-lock p{
    font-size:12.5px;
    color:var(--ink-soft);
    margin:0 0 18px;
  }
  .admin-lock input{
    width:100%;
    font-family:inherit;
    font-size:15px;
    padding:11px 13px;
    border:1.4px solid var(--line);
    border-radius:8px;
    background:var(--paper);
    text-align:center;
    margin-bottom:12px;
  }
  .admin-lock button{
    width:100%;
    font-family:inherit;
    font-weight:700;
    font-size:14px;
    padding:11px;
    border:none;
    border-radius:8px;
    background:var(--ink);
    color:var(--paper);
    cursor:pointer;
  }
  .admin-lock .lock-err{
    font-size:12px;
    color:var(--stamp-deep);
    font-weight:700;
    margin-bottom:10px;
  }

  .admin-panel{
    background:#FFFDF8;
    border:1px solid var(--line);
    border-radius:14px;
    padding:22px;
  }
  .admin-panel .admin-head{
    display:flex;
    justify-content:space-between;
    align-items:baseline;
    margin-bottom:16px;
  }
  .admin-panel .admin-head h2{
    font-family:'Zen Old Mincho','Noto Serif JP',serif;
    font-size:18px;
    margin:0;
  }
  .admin-panel .count-badge{
    font-size:12px;
    background:var(--stamp);
    color:#fff;
    padding:4px 10px;
    border-radius:999px;
    font-weight:700;
  }
  .admin-empty{
    text-align:center;
    padding:40px 10px;
    color:var(--ink-soft);
    font-size:13px;
  }
  .res-card{
    border:1px solid var(--line);
    border-radius:10px;
    padding:14px 16px;
    margin-bottom:12px;
    background:var(--paper);
  }
  .res-card .res-top{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    margin-bottom:8px;
  }
  .res-card .res-name{
    font-weight:700;
    font-size:15px;
  }
  .res-card .res-time{
    font-size:11.5px;
    font-weight:700;
    color:#fff;
    background:var(--stamp);
    padding:3px 9px;
    border-radius:999px;
    white-space:nowrap;
  }
  .res-card .res-detail{
    font-size:12.5px;
    color:var(--ink-soft);
    line-height:1.7;
  }
  .res-card .res-detail b{
    color:var(--ink);
    font-weight:600;
  }
  .res-card .booth-row{
    margin-top:10px;
    padding-top:10px;
    border-top:1px dashed var(--line);
    display:flex;
    gap:8px;
    align-items:center;
  }
  .res-card .booth-row label{
    font-size:11.5px;
    font-weight:700;
    color:var(--ink-soft);
    white-space:nowrap;
  }
  .res-card .booth-row input{
    flex:1;
    font-family:inherit;
    font-size:13px;
    padding:7px 10px;
    border:1.4px solid var(--line);
    border-radius:6px;
    background:#fff;
  }
  .res-card .booth-row input:focus{
    outline:none;
    border-color:var(--stamp);
  }
  .res-card .booth-row .saved-mark{
    font-size:11px;
    color:var(--green-ok);
    font-weight:700;
    width:36px;
    text-align:center;
    opacity:0;
    transition:opacity .2s;
  }
  .res-card .booth-row .saved-mark.show{ opacity:1; }

  .admin-logout{
    display:block;
    margin:18px auto 0;
    background:none;
    border:none;
    color:var(--ink-soft);
    font-size:12px;
    text-decoration:underline;
    cursor:pointer;
    font-family:inherit;
  }

  .loading-msg{
    text-align:center;
    padding:40px;
    color:var(--ink-soft);
    font-size:13px;
  }

  .refresh-btn{
    display:block;
    margin:0 auto 16px;
    background:none;
    border:1.4px solid var(--line);
    color:var(--ink-soft);
    font-size:12px;
    font-weight:700;
    padding:7px 14px;
    border-radius:999px;
    cursor:pointer;
    font-family:inherit;
  }

  @media (max-width:380px){
    .timegrid{ grid-template-columns:repeat(3,1fr); }
    .ticket-top, .ticket-bottom{ padding-left:18px; padding-right:18px; }
    .perforation{ margin:0 18px; }
  }
</style>

<script>
(function(){
  "use strict";

  var ADMIN_PASSWORD = "event2026";
  var SLOT_CAPACITY = 50;
  var WEBHOOK_URL = "https://hook.us2.make.com/a3bq87cxfft1s567cwbhkl6pu93nlciw";
  var TIME_SLOTS = [
    "10:00-11:00","11:00-12:00","12:00-13:00",
    "13:00-14:00","14:00-15:00","15:00-16:00",
    "16:00-17:00","17:00-18:00","18:00-19:00"
  ];

  var root = document.getElementById('app-root');

  // ---------------- state ----------------
  var state = {
    mode: "user",              // user | admin
    adminUnlocked: false,
    confirmedRecord: null,     // shown after successful submit
    form: {
      name: "", phone: "", email: "", referrer: "",
      ampm: null, slot: null
    },
    errors: {},
    formError: "",
    submitting: false,
    adminInput: "",
    adminLockError: false,
    reservations: [],
    adminLoading: false,
    boothDrafts: {},
    savedFlash: {},
    slotCounts: {},            // { "10:00-11:00": 12, ... }
    slotCountsLoaded: false
  };

  function uid(){
    return 'r_' + Date.now().toString(36) + Math.random().toString(36).slice(2,8);
  }

  function countSlots(){
    var listPromise;
    try{
      listPromise = window.storage.list('reservation:', true);
    }catch(err){
      return Promise.reject(err);
    }
    return listPromise.then(function(listRes){
      var keys = (listRes && listRes.keys) ? listRes.keys : [];
      var items = [];
      var chain = Promise.resolve();
      keys.forEach(function(k){
        chain = chain.then(function(){
          return window.storage.get(k, true).then(function(got){
            if(got && got.value){
              try{ items.push(JSON.parse(got.value)); }catch(e){}
            }
          }).catch(function(){});
        });
      });
      return chain.then(function(){ return items; });
    }).then(function(items){
      var counts = {};
      TIME_SLOTS.forEach(function(t){ counts[t] = 0; });
      items.forEach(function(r){
        if(r && r.slot && counts.hasOwnProperty(r.slot)){
          counts[r.slot] += 1;
        }
      });
      return counts;
    });
  }

  function refreshSlotCounts(thenRender){
    countSlots().then(function(counts){
      state.slotCounts = counts;
      state.slotCountsLoaded = true;
      if(thenRender) render();
    }).catch(function(){
      state.slotCountsLoaded = true;
      if(thenRender) render();
    });
  }

  function notifyWebhook(record){
    // Send the reservation details to the Make.com webhook so it can
    // trigger an automatic confirmation email. We don't block the UI
    // on this, and a failure here doesn't affect the saved reservation.
    if(!WEBHOOK_URL) return;
    try{
      fetch(WEBHOOK_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          name: record.name,
          phone: record.phone,
          email: record.email,
          referrer: record.referrer,
          slot: record.slot,
          ampm: record.ampm,
          createdAt: record.createdAt
        })
      }).catch(function(){ /* ignore network errors, reservation is already saved */ });
    }catch(err){ /* ignore, reservation is already saved */ }
  }

  function escapeHtml(str){
    return String(str)
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;')
      .replace(/'/g,'&#39;');
  }

  // ---------------- render ----------------
  function render(){
    var html = '';
    html += '<div class="stage">';
    html += '<div class="masthead">';
    html += '<div class="eyebrow">Event Reservation</div>';
    html += '<h1>イベント予約受付</h1>';
    html += '<div class="sub">ご希望の時間帯をお選びください</div>';
    html += '<div class="dotline"></div>';
    html += '</div>';

    html += '<div class="modebar">';
    html += '<button data-action="switch-mode" data-mode="user" class="' + (state.mode === 'user' ? 'active' : '') + '">予約する</button>';
    html += '<button data-action="switch-mode" data-mode="admin" class="' + (state.mode === 'admin' ? 'active' : '') + '">管理者用</button>';
    html += '</div>';

    if(state.mode === 'user'){
      html += state.confirmedRecord ? renderConfirmation() : renderForm();
    } else {
      html += state.adminUnlocked ? renderAdminPanel() : renderAdminLock();
    }

    html += '</div>';
    root.innerHTML = html;
    attachListeners();
  }

  function renderForm(){
    var f = state.form;
    var errs = state.errors;
    var html = '<div class="ticket">';
    html += '<div class="ticket-top">';
    html += '<div class="ticket-section-title">お客様情報</div>';

    if(state.formError){
      html += '<div class="form-error">' + escapeHtml(state.formError) + '</div>';
    }

    html += fieldHtml('name', 'お名前', 'text', f.name, '山田 太郎', errs.name);
    html += fieldHtml('phone', '電話番号', 'tel', f.phone, '090-1234-5678', errs.phone);
    html += fieldHtml('email', 'メールアドレス', 'email', f.email, 'taro@example.com', errs.email);
    html += fieldHtml('referrer', '紹介者（任意）', 'text', f.referrer, '紹介してくれた方のお名前', null);

    html += '<div class="ticket-section-title second">ご希望の時間（いずれか1つを選択）</div>';

    html += '<div class="field' + (errs.choice ? ' err' : '') + '" style="margin-bottom:14px;">';
    html += '<label>午前・午後の希望</label>';
    html += '<div class="pillrow">';
    html += '<div class="pill' + (f.ampm === '午前希望' ? ' selected' : '') + '" data-action="set-ampm" data-value="午前希望">午前希望</div>';
    html += '<div class="pill' + (f.ampm === '午後希望' ? ' selected' : '') + '" data-action="set-ampm" data-value="午後希望">午後希望</div>';
    html += '</div>';
    html += '</div>';

    html += '<div class="field' + (errs.choice ? ' err' : '') + '">';
    html += '<label>時間枠（1時間ごと・各枠最大' + SLOT_CAPACITY + '名）</label>';
    html += '<div class="timegrid">';
    TIME_SLOTS.forEach(function(t){
      var count = state.slotCounts[t] || 0;
      var isFull = count >= SLOT_CAPACITY;
      var classes = 'timeslot';
      if(f.slot === t) classes += ' selected';
      if(isFull && f.slot !== t) classes += ' full';
      html += '<div class="' + classes + '" data-action="set-slot" data-value="' + t + '" data-full="' + (isFull ? '1' : '0') + '">' + t + '</div>';
    });
    html += '</div>';
    if(errs.choice) html += '<div class="err-msg">' + escapeHtml(errs.choice) + '</div>';
    html += '</div>';

    html += '</div>'; // ticket-top

    html += '<div class="perforation"></div>';

    html += '<div class="ticket-bottom">';
    html += '<button class="submit-btn" data-action="submit" ' + (state.submitting ? 'disabled' : '') + '>';
    html += state.submitting ? '送信中...' : 'この内容で予約する';
    html += '</button>';
    html += '</div>';

    html += '</div>'; // ticket
    return html;
  }

  function fieldHtml(key, label, type, value, placeholder, error){
    var html = '<div class="field' + (error ? ' err' : '') + '">';
    html += '<label>' + label + '</label>';
    html += '<input type="' + type + '" data-field="' + key + '" value="' + escapeHtml(value) + '" placeholder="' + escapeHtml(placeholder) + '" />';
    if(error) html += '<div class="err-msg">' + escapeHtml(error) + '</div>';
    html += '</div>';
    return html;
  }

  function describeChoice(r){
    return r.slot ? r.slot : (r.ampm || "");
  }

  function renderConfirmation(){
    var r = state.confirmedRecord;
    var html = '<div class="ticket"><div class="confirm">';
    html += '<div class="stamp-circle">✓</div>';
    html += '<h2>予約を受け付けました</h2>';
    html += '<p>当日は受付にてお名前をお伝えください。</p>';
    html += '<div class="recap">';
    html += '<div><span>お名前</span><span>' + escapeHtml(r.name) + '</span></div>';
    html += '<div><span>ご希望</span><span>' + escapeHtml(describeChoice(r)) + '</span></div>';
    html += '<div><span>紹介者</span><span>' + escapeHtml(r.referrer) + '</span></div>';
    html += '</div>';
    html += '<button class="again" data-action="reset-form">もう一件予約する</button>';
    html += '</div></div>';
    return html;
  }

  function renderAdminLock(){
    var html = '<div class="admin-lock">';
    html += '<div class="lock-icon">🔒</div>';
    html += '<h2>管理者用ページ</h2>';
    html += '<p>予約一覧の確認にはパスワードが必要です</p>';
    if(state.adminLockError){
      html += '<div class="lock-err">パスワードが正しくありません</div>';
    }
    html += '<input type="password" id="admin-pass-input" placeholder="パスワード" value="' + escapeHtml(state.adminInput) + '" />';
    html += '<button data-action="try-unlock">確認する</button>';
    html += '</div>';
    return html;
  }

  function renderAdminPanel(){
    var html = '<div class="admin-panel">';
    html += '<div class="admin-head"><h2>予約一覧</h2><span class="count-badge">' + state.reservations.length + '件</span></div>';
    html += '<button class="refresh-btn" data-action="refresh-admin">一覧を更新</button>';

    if(state.adminLoading){
      html += '<div class="admin-empty">読み込み中...</div>';
    } else if(state.reservations.length === 0){
      html += '<div class="admin-empty">まだ予約はありません</div>';
    } else {
      state.reservations.forEach(function(r){
        var draft = state.boothDrafts[r.id] !== undefined ? state.boothDrafts[r.id] : (r.booth || '');
        html += '<div class="res-card" data-id="' + r.id + '">';
        html += '<div class="res-top"><span class="res-name">' + escapeHtml(r.name) + '</span><span class="res-time">' + escapeHtml(describeChoice(r)) + '</span></div>';
        html += '<div class="res-detail">';
        html += '<div><b>電話:</b> ' + escapeHtml(r.phone) + '</div>';
        html += '<div><b>メール:</b> ' + escapeHtml(r.email) + '</div>';
        html += '<div><b>紹介者:</b> ' + escapeHtml(r.referrer) + '</div>';
        html += '</div>';
        html += '<div class="booth-row">';
        html += '<label>ブース:</label>';
        html += '<input type="text" data-booth-id="' + r.id + '" value="' + escapeHtml(draft) + '" placeholder="未入力" />';
        html += '<span class="saved-mark' + (state.savedFlash[r.id] ? ' show' : '') + '">保存済</span>';
        html += '</div>';
        html += '</div>';
      });
    }

    html += '<button class="admin-logout" data-action="admin-logout">管理者ページを閉じる</button>';
    html += '</div>';
    return html;
  }

  // ---------------- validation & submit ----------------
  function validate(){
    var f = state.form;
    var e = {};
    if(!f.name.trim()) e.name = "お名前を入力してください";
    if(!f.phone.trim()) e.phone = "電話番号を入力してください";
    else if(!/^[0-9\-+() ]{8,}$/.test(f.phone.trim())) e.phone = "電話番号の形式を確認してください";
    if(!f.email.trim()) e.email = "メールアドレスを入力してください";
    else if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(f.email.trim())) e.email = "メールアドレスの形式を確認してください";

    if(!f.slot && !f.ampm){
      e.choice = "午前・午後の希望、または時間枠のいずれかを選択してください";
    } else if(f.slot && (state.slotCounts[f.slot] || 0) >= SLOT_CAPACITY){
      e.choice = "この時間枠は満員です。別の時間枠を選んでください";
    }

    state.errors = e;
    return Object.keys(e).length === 0;
  }

  function submitForm(){
    state.formError = "";
    if(!validate()){
      render();
      return;
    }
    state.submitting = true;
    render();

    var f = state.form;

    // Re-check capacity right before saving, in case another person
    // filled the slot while this user had the form open.
    countSlots().then(function(counts){
      state.slotCounts = counts;
      if(f.slot){
        var currentCount = counts[f.slot] || 0;
        if(currentCount >= SLOT_CAPACITY){
          state.submitting = false;
          state.formError = "この時間枠はちょうど満員になりました。別の時間枠を選んでください。";
          state.form.slot = null;
          render();
          return;
        }
      }

      var record = {
        id: uid(),
        name: f.name.trim(),
        phone: f.phone.trim(),
        email: f.email.trim(),
        referrer: f.referrer.trim() || "(なし)",
        slot: f.slot,
        ampm: f.ampm,
        booth: "",
        createdAt: new Date().toISOString()
      };

      var savePromise;
      try{
        savePromise = window.storage.set('reservation:' + record.id, JSON.stringify(record), true);
      }catch(err){
        savePromise = Promise.reject(err);
      }

      savePromise.then(function(result){
        state.submitting = false;
        if(!result){
          state.formError = "予約の保存に失敗しました。もう一度お試しください。";
          render();
          return;
        }
        notifyWebhook(record);
        state.confirmedRecord = record;
        render();
      }).catch(function(){
        state.submitting = false;
        state.formError = "予約の保存に失敗しました。もう一度お試しください。";
        render();
      });
    }).catch(function(){
      state.submitting = false;
      state.formError = "予約状況の確認に失敗しました。もう一度お試しください。";
      render();
    });
  }

  function resetForm(){
    state.form = { name:"", phone:"", email:"", referrer:"", ampm:null, slot:null };
    state.errors = {};
    state.formError = "";
    state.confirmedRecord = null;
    render();
    refreshSlotCounts(true);
  }

  // ---------------- admin ----------------
  function loadReservations(){
    state.adminLoading = true;
    render();

    var listPromise;
    try{
      listPromise = window.storage.list('reservation:', true);
    }catch(err){
      listPromise = Promise.reject(err);
    }

    listPromise.then(function(listRes){
      var keys = (listRes && listRes.keys) ? listRes.keys : [];
      var items = [];
      var chain = Promise.resolve();
      keys.forEach(function(k){
        chain = chain.then(function(){
          return window.storage.get(k, true).then(function(got){
            if(got && got.value){
              try{ items.push(JSON.parse(got.value)); }catch(e){}
            }
          }).catch(function(){ /* skip unreadable entry */ });
        });
      });
      return chain.then(function(){ return items; });
    }).then(function(items){
      items.sort(function(a,b){ return new Date(b.createdAt) - new Date(a.createdAt); });
      state.reservations = items;
      var drafts = {};
      items.forEach(function(r){ drafts[r.id] = r.booth || ""; });
      state.boothDrafts = drafts;
      var counts = {};
      TIME_SLOTS.forEach(function(t){ counts[t] = 0; });
      items.forEach(function(r){
        if(r && r.slot && counts.hasOwnProperty(r.slot)){
          counts[r.slot] += 1;
        }
      });
      state.slotCounts = counts;
      state.adminLoading = false;
      render();
    }).catch(function(){
      state.reservations = [];
      state.adminLoading = false;
      render();
    });
  }

  function saveBooth(id){
    var record = null;
    for(var i=0;i<state.reservations.length;i++){
      if(state.reservations[i].id === id){ record = state.reservations[i]; break; }
    }
    if(!record) return;
    var newBooth = state.boothDrafts[id] !== undefined ? state.boothDrafts[id] : "";
    var updated = Object.assign({}, record, { booth: newBooth });

    var setPromise;
    try{
      setPromise = window.storage.set('reservation:' + id, JSON.stringify(updated), true);
    }catch(err){
      setPromise = Promise.reject(err);
    }

    setPromise.then(function(result){
      if(result){
        for(var i=0;i<state.reservations.length;i++){
          if(state.reservations[i].id === id){ state.reservations[i] = updated; break; }
        }
        state.savedFlash[id] = true;
        render();
        setTimeout(function(){
          state.savedFlash[id] = false;
          render();
        }, 1500);
      }
    }).catch(function(){ /* save failed silently, user can retry by editing again */ });
  }

  // ---------------- event delegation ----------------
  function attachListeners(){
    root.querySelectorAll('[data-field]').forEach(function(input){
      input.addEventListener('input', function(){
        state.form[input.getAttribute('data-field')] = input.value;
      });
    });

    root.querySelectorAll('[data-action="set-ampm"]').forEach(function(el){
      el.addEventListener('click', function(){
        state.form.ampm = el.getAttribute('data-value');
        state.form.slot = null;
        render();
      });
    });

    root.querySelectorAll('[data-action="set-slot"]').forEach(function(el){
      el.addEventListener('click', function(){
        if(el.getAttribute('data-full') === '1') return;
        state.form.slot = el.getAttribute('data-value');
        state.form.ampm = null;
        render();
      });
    });

    var submitBtn = root.querySelector('[data-action="submit"]');
    if(submitBtn) submitBtn.addEventListener('click', submitForm);

    var resetBtn = root.querySelector('[data-action="reset-form"]');
    if(resetBtn) resetBtn.addEventListener('click', resetForm);

    root.querySelectorAll('[data-action="switch-mode"]').forEach(function(el){
      el.addEventListener('click', function(){
        var m = el.getAttribute('data-mode');
        state.mode = m;
        if(m === 'user'){ state.confirmedRecord = null; }
        if(m === 'admin' && state.adminUnlocked){ loadReservations(); }
        render();
      });
    });

    var unlockBtn = root.querySelector('[data-action="try-unlock"]');
    if(unlockBtn){
      unlockBtn.addEventListener('click', tryUnlock);
    }
    var passInput = document.getElementById('admin-pass-input');
    if(passInput){
      passInput.addEventListener('input', function(){ state.adminInput = passInput.value; });
      passInput.addEventListener('keydown', function(e){
        if(e.key === 'Enter') tryUnlock();
      });
    }

    var refreshBtn = root.querySelector('[data-action="refresh-admin"]');
    if(refreshBtn) refreshBtn.addEventListener('click', loadReservations);

    var logoutBtn = root.querySelector('[data-action="admin-logout"]');
    if(logoutBtn){
      logoutBtn.addEventListener('click', function(){
        state.adminUnlocked = false;
        render();
      });
    }

    root.querySelectorAll('[data-booth-id]').forEach(function(input){
      var id = input.getAttribute('data-booth-id');
      input.addEventListener('input', function(){
        state.boothDrafts[id] = input.value;
      });
      input.addEventListener('blur', function(){
        saveBooth(id);
      });
      input.addEventListener('keydown', function(e){
        if(e.key === 'Enter') saveBooth(id);
      });
    });
  }

  function tryUnlock(){
    if(state.adminInput === ADMIN_PASSWORD){
      state.adminUnlocked = true;
      state.adminLockError = false;
      state.adminInput = "";
      render();
      loadReservations();
    } else {
      state.adminLockError = true;
      render();
    }
  }

  render();
  refreshSlotCounts(true);
})();
</script>
